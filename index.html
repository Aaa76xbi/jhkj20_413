    /**
     * 处理群发功能
     */
    function handleBroadcast() {
        if (!state.token) {
            alert('请先登录！');
            return;
        }

        // 创建一个临时的语音录入界面
        const overlay = document.createElement('div');
        overlay.className = 'broadcast-overlay';
        overlay.innerHTML = `
            <div class="broadcast-panel">
                <h3>群发语音</h3>
                <p>按住下方按钮开始录制，松开结束录制</p>
                <button id="broadcast-record-button" class="broadcast-record-button">按住说话</button>
                <p id="broadcast-status">点击开始录制</p>
                <button id="broadcast-cancel" class="broadcast-cancel">取消</button>
            </div>
        `;
        document.body.appendChild(overlay);

        const recordButton = overlay.querySelector('#broadcast-record-button');
        const statusText = overlay.querySelector('#broadcast-status');
        const cancelButton = overlay.querySelector('#broadcast-cancel');
        let isRecording = false;
        let recordingStartTime = 0;
        let mediaRecorder = null;
        let stream = null;
        let audioBlob = null;
        let audioChunks = [];

        // 初始化音频录音器
        async function initAudioRecorder() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new RecordRTC(stream, {
                    type: 'audio',
                    mimeType: 'audio/webm;codecs=pcm',
                    recorderType: RecordRTC.StereoAudioRecorder,
                    numberOfAudioChannels: 1,
                    desiredSampRate: 16000
                });
                return mediaRecorder;
            } catch (error) {
                console.error('初始化录音器失败:', error);
                alert('无法访问麦克风，请检查浏览器权限设置');
                return null;
            }
        }

        // 开始录制音频
        async function startRecording() {
            if (isRecording) return;

            if (!mediaRecorder) {
                mediaRecorder = await initAudioRecorder();
                if (!mediaRecorder) return;
            }

            // 清空之前的录音数据
            audioChunks = [];
            recordingStartTime = Date.now();
            isRecording = true;

            // 开始录制
            mediaRecorder.startRecording();

            // 更新UI
            recordButton.classList.add('recording');
            statusText.textContent = '松开结束录制';

            console.log('开始录音...');
        }

        // 停止录制音频
        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;

            // 停止录制
            mediaRecorder.stopRecording(async function() {
                const duration = Math.floor((Date.now() - recordingStartTime) / 1000);
                const webmBlob = mediaRecorder.getBlob();

                // 转换为MP3格式
                await convertToMP3(webmBlob, duration);

                // 停止音频流
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }

                // 重置录音器
                mediaRecorder = null;
            });

            // 重置录音状态
            isRecording = false;

            // 更新UI
            recordButton.classList.remove('recording');
            statusText.textContent = '正在处理音频...';

            console.log('停止录音...正在处理音频...');
        }

        // 处理MP3转换
        async function convertToMP3(webmBlob, duration) {
            return new Promise((resolve, reject) => {
                const fileReader = new FileReader();
                fileReader.onload = function(e) {
                    try {
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        audioContext.decodeAudioData(e.target.result, async function(audioBuffer) {
                            // 转换为单声道
                            const channels = 1;
                            const sampleRate = 44100;
                            const kbps = 64;

                            const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, kbps);
                            const samples = audioBuffer.getChannelData(0);
                            const sampleBlockSize = 1152;
                            const mp3Data = [];

                            // 转换为16位PCM
                            const samples16 = new Int16Array(samples.length);
                            for (let i = 0; i < samples.length; i++) {
                                samples16[i] = samples[i] * 0x7FFF;
                            }

                            for (let i = 0; i < samples16.length; i += sampleBlockSize) {
                                const sampleChunk = samples16.subarray(i, i + sampleBlockSize);
                                const mp3buf = mp3encoder.encodeBuffer(sampleChunk);
                                if (mp3buf.length > 0) {
                                    mp3Data.push(mp3buf);
                                }
                            }

                            const mp3buf = mp3encoder.flush();
                            if (mp3buf.length > 0) {
                                mp3Data.push(mp3buf);
                            }

                            audioBlob = new Blob(mp3Data, { type: 'audio/mp3' });
                            console.log('MP3文件已生成，大小:', audioBlob.size, '字节');

                            // 上传音频
                            if (duration > 0 && state.token) {
                                await uploadBroadcastAudio(audioBlob, duration);
                            }

                            resolve();
                        }, function(error) {
                            console.error('音频解码失败:', error);
                            reject(error);
                        });
                    } catch (error) {
                        console.error('MP3转换失败:', error);
                        reject(error);
                    }
                };
                fileReader.onerror = reject;
                fileReader.readAsArrayBuffer(webmBlob);
            });
        }

        // 上传群发音频
        async function uploadBroadcastAudio(audioBlob, duration) {
            if (!state.token) {
                console.error('未登录');
                return;
            }

            try {
                // 生成消息ID
                const msgId = generateMessageId();

                // 读取MP3音频数据为Base64
                const reader = new FileReader();
                const audioBase64 = await new Promise((resolve, reject) => {
                    reader.onload = () => {
                        try {
                            let dataUrl = reader.result;
                            console.log('生成的DataURL（前100字符）：', dataUrl.slice(0, 100));

                            // 强容错：不管格式如何，强制提取Base64部分
                            let base64Str = '';
                            if (dataUrl.includes(',')) {
                                base64Str = dataUrl.split(',')[1];
                            } else if (dataUrl.includes('base64')) {
                                base64Str = dataUrl.split('base64')[1];
                            } else {
                                base64Str = dataUrl;
                            }

                            // 验证Base64有效性
                            base64Str = base64Str.trim();
                            if (base64Str.length % 4 !== 0) {
                                const padLength = 4 - (base64Str.length % 4);
                                if (padLength < 4) {
                                    base64Str += '='.repeat(padLength);
                                }
                            }

                            resolve(base64Str);
                        } catch (error) {
                            reject(new Error('Base64处理失败: ' + error.message));
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(audioBlob);
                });

                console.log('准备上传MP3音频数据:', audioBlob.size, '字节');

                // 使用现有generateSign函数生成签名和时间戳
                const { sign, timestamp } = generateSign(state.token);

                // 准备请求数据
                const params = {
                    data: audioBase64,
                    duration: duration.toString(),
                    msgId: msgId,
                    type: "mp3"
                };

                // 构造完整请求头
                const headers = {
                    "accept": "application/json, text/plain, */*",
                    "accept-encoding": "gzip, deflate, br, zstd",
                    "accept-language": "zh-CN,zh;q=0.9,en;q=0.8,en-GB;q=0.7,en-US;q=0.6",
                    "Content-Type": "application/json",
                    "deviceid": config.device_id,

                    "sec-ch-ua-platform": "\"Windows\"",
                    "sign": sign,

                    "user-agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36 Edg/139.0.0.0",
                    "version": config.version
                };

                console.log('准备上传音频到群发API接口:', {
                    url: 'https://vapi.juheiot.cn/apiv1/table/upHelpVoice',
                    params: params,
                    headers: headers
                });

                // 发送请求到聚合API服务器
                const response = await fetch('https://vapi.juheiot.cn/apiv1/table/upHelpVoice', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(params)
                });

                const result = await response.json();

                if (result.code === 200) {
                    console.log('音频上传成功:', result);
                    alert('群发语音发送成功！');
                } else {
                    console.error('音频上传失败:', result);
                    alert('群发语音发送失败，请重试！');
                }

                // 移除弹窗
                document.body.removeChild(overlay);
            } catch (error) {
                console.error('上传音频时发生错误:', error);
                alert('上传音频时发生错误，请重试！');
                document.body.removeChild(overlay);
            }
        }

        // 添加按钮事件
        recordButton.addEventListener('mousedown', startRecording);
        recordButton.addEventListener('touchstart', startRecording);

                background: linear-gradient(135deg, #e53935, #c62828);
                box-shadow: 0 6px 20px rgba(229, 57, 53, 0.6), 0 0 30px rgba(229, 57, 53, 0.4);
                animation: pulse 1.5s infinite;
            }
            @keyframes pulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.05); }
                100% { transform: scale(1); }
            }
            .broadcast-cancel {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: white;
                padding: 10px 20px;
                border-radius: 25px;
                cursor: pointer;
                font-size: 16px;
                transition: all 0.3s ease;
            }
            .broadcast-cancel:hover {
                background: rgba(255, 255, 255, 0.2);
                transform: translateY(-2px);
            }
        `;
        document.head.appendChild(style);
    }

    // --- 初始化 ---

    ui.loginForm.addEventListener('submit', handleLogin);

    // 添加设置图标点击事件
    const settingsIcon = document.querySelector('.settings-icon');
    const settingsDropdown = document.getElementById('settings-dropdown');
    const logoutItem = document.getElementById('logout-item');
    const broadcastItem = document.getElementById('broadcast-item');

    if (settingsIcon && settingsDropdown) {
        settingsIcon.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止事件冒泡
            settingsDropdown.classList.toggle('show');
        });

        // 点击其他区域关闭下拉框
        document.addEventListener('click', () => {
            if (settingsDropdown.classList.contains('show')) {
                settingsDropdown.classList.remove('show');
            }
        });

        // 阻止下拉框内点击事件冒泡
        settingsDropdown.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // 添加退出登录点击事件
        if (logoutItem) {
            logoutItem.addEventListener('click', () => {
                settingsDropdown.classList.remove('show');
                handleLogout();
            });
        }

        // 添加群发点击事件
        if (broadcastItem) {
            broadcastItem.addEventListener('click', () => {
                settingsDropdown.classList.remove('show');
                handleBroadcast();
            });
        }
    }
    updateClock();
    setInterval(updateClock, 1000);
    ui.chatClose.addEventListener('click', closeChatDialog);
    ui.chatOverlay.addEventListener('click', closeChatDialog);

    // 将原有的 "click to toggle" 模式改回 "press and hold" (按住和松开) 模式
    if (ui.holdToTalkButton) {
        // 鼠标按下事件
        ui.holdToTalkButton.addEventListener('mousedown', startRecording);
        // 鼠标松开事件
        ui.holdToTalkButton.addEventListener('mouseup', stopRecording);
        // 鼠标移出按钮区域也停止录音
        ui.holdToTalkButton.addEventListener('mouseleave', stopRecording);

        // 触摸屏按下事件
        ui.holdToTalkButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        // 触摸屏松开事件
        ui.holdToTalkButton.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });
    }

    ui.chatDialog.addEventListener('click', (e) => {
        e.stopPropagation();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && state.current_room_id !== null) {
            closeChatDialog();
        }
        if (e.key === 'Escape' && typeof xzState !== 'undefined' && xzState.isXz) {
            closeChatDialog();
        }
    });

    // 小智设备事件绑定
    const xzFab = document.getElementById('xz-fab');
    if (xzFab) {
        xzFab.addEventListener('click', e => { e.stopPropagation(); document.getElementById('xz-popup').classList.toggle('show'); });
    }
    document.addEventListener('click', e => {
        const panel = document.getElementById('xz-panel');
        if (panel && !panel.contains(e.target)) {
            const popup = document.getElementById('xz-popup');
            if (popup) popup.classList.remove('show');
        }
    });
    const xzPopup = document.getElementById('xz-popup');
    if (xzPopup) xzPopup.addEventListener('click', e => e.stopPropagation());
    const xzAddBtn = document.getElementById('xz-add-btn');
    if (xzAddBtn) xzAddBtn.addEventListener('click', e => { e.stopPropagation(); xzAddDevice(); });
    const xzTalkBtn = document.getElementById('xz-talk-btn');
    if (xzTalkBtn) {
        xzTalkBtn.addEventListener('mousedown', xzStartRec);
        xzTalkBtn.addEventListener('mouseup', xzStopRec);
        xzTalkBtn.addEventListener('mouseleave', xzStopRec);
        xzTalkBtn.addEventListener('touchstart', e => { e.preventDefault(); xzStartRec(); });
        xzTalkBtn.addEventListener('touchend', e => { e.preventDefault(); xzStopRec(); });
    }

});
</script>

<!-- ====== 小智设备通话功能 ====== -->
<script>
const XZ_SERVER = 'http://8.217.168.200:8000';
const XZ_WS_BASE = 'ws://8.217.168.200:8000/ws';
const xzWsMap = new Map(), xzDevSt = new Map(), xzHistCache = new Map(), audioBlobCache = new Map();
let xzState = { isXz: false, curId: null, curName: null };
const xzNotifAud = new Audio('https://web.juheiot.cn/asset/media/dingdong.04bd20f4.wav');

function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function fmtFull(ts) { const d = new Date(ts * 1000); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function timeAgo(ts) { const s = Math.floor(Date.now() / 1000) - ts; if (s < 60) return '刚刚'; if (s < 3600) return Math.floor(s / 60) + '分钟前'; if (s < 86400) return Math.floor(s / 3600) + '小时前'; return Math.floor(s / 86400) + '天前'; }

// 预加载音频
function xzPreloadAudio(url) {
    if (!url || audioBlobCache.has(url)) return;
    audioBlobCache.set(url, 'loading');
    fetch(url).then(r => r.blob()).then(blob => audioBlobCache.set(url, URL.createObjectURL(blob))).catch(() => audioBlobCache.delete(url));
}
// 播放音频（用于 xz 气泡播放按钮）
function xzPlayAudio(src, btn) {
    if (!src || !btn) return;
    document.querySelectorAll('.play-btn').forEach(b => { if (b !== btn) { b.textContent = '▶'; delete b.dataset.playing; } });
    if (btn.dataset.playing) { btn.textContent = '▶'; delete btn.dataset.playing; return; }
    btn.textContent = '⏸'; btn.dataset.playing = '1';
    const cached = audioBlobCache.get(src);
    const finalUrl = (cached && cached !== 'loading') ? cached : src;
    const a = new Audio(finalUrl);
    a.play().then(() => { a.onended = () => { btn.textContent = '▶'; delete btn.dataset.playing; }; }).catch(() => { btn.textContent = '▶'; delete btn.dataset.playing; });
}

// WS 连接
function xzSrvSt(st, text) {
    const dot = document.getElementById('xz-srv-dot'), txt = document.getElementById('xz-srv-text'), connDot = document.getElementById('xz-conn-dot');
    if (dot) dot.className = st;
    if (txt) txt.textContent = text;
    if (connDot) connDot.className = st === 'on' ? 'on' : st === 'wait' ? 'wait' : '';
}
function xzConnect(roomId) {
    if (xzWsMap.has(roomId)) return;
    const ws = new WebSocket(`${XZ_WS_BASE}/${roomId}`);
    let hb;
    ws.onopen = () => { xzSrvSt('on', '已连接'); const btn = document.getElementById('xz-srv-btn'); if(btn){btn.textContent='断开';btn.className='xz-srv-btn dc';} hb = setInterval(() => { if (ws.readyState === 1) ws.send('ping'); }, 30000); };
    ws.onmessage = (e) => { let msg; try { msg = JSON.parse(e.data); } catch { return; } if (msg.type === 'pong') return; if (msg.type === 'history') { xzOnHistory(roomId, msg.messages); return; } if (msg.type === 'voice') xzOnVoice(roomId, msg); };
    ws.onclose = () => { clearInterval(hb); xzWsMap.delete(roomId); if (!xzWsMap.size) { xzSrvSt('', '已断开'); const btn = document.getElementById('xz-srv-btn'); if(btn){btn.textContent='连接服务器';btn.className='xz-srv-btn';} } const d = xzGetCfg(); if (d.find(x => x.id === roomId)) setTimeout(() => xzConnect(roomId), 5000); };
    ws.onerror = () => xzSrvSt('err', '连接出错');
    xzWsMap.set(roomId, ws);
}
function xzDisconnect(roomId) { const ws = xzWsMap.get(roomId); if (ws) { ws.close(); xzWsMap.delete(roomId); } }
window.xzSrvToggle = function() {
    if (xzWsMap.size > 0) { xzWsMap.forEach(ws => ws.close()); xzWsMap.clear(); xzSrvSt('', '未连接'); const btn = document.getElementById('xz-srv-btn'); if(btn){btn.textContent='连接服务器';btn.className='xz-srv-btn';} }
    else { const d = xzGetCfg(); if (!d.length) { alert('请先添加小智设备'); return; } xzSrvSt('wait', '正在连接…'); d.forEach(x => xzConnect(x.id)); }
};

// LocalStorage 存储
function xzGetCfg() { try { return JSON.parse(localStorage.getItem('xz_devs') || '[]'); } catch { return []; } }
function xzSaveCfg(a) { localStorage.setItem('xz_devs', JSON.stringify(a)); }

// 消息处理
function xzOnHistory(roomId, messages) {
    if (!messages || !messages.length) return;
    xzHistCache.set(String(roomId), messages);
    const latest = messages[messages.length - 1];
    const dev = xzDevSt.get(roomId) || { unread: 0 };
    dev.lastTime = latest.created_at; dev.lastTxt = `${latest.room_name}·${latest.duration}秒语音`; dev.online = (Date.now() / 1000 - latest.created_at) < 300;
    xzDevSt.set(roomId, dev); renderXzCards();
    if (xzState.isXz && String(xzState.curId) === String(roomId)) renderXzMsgs(roomId, messages, false);
}
function xzOnVoice(roomId, msg) {
    const cfg = xzGetCfg().find(d => d.id === roomId);
    const name = cfg ? cfg.name : (msg.room_name || '小智设备');
    xzNotifAud.cloneNode().play().catch(() => {});
    const dev = xzDevSt.get(roomId) || { unread: 0 };
    dev.lastTime = msg.created_at || Math.floor(Date.now() / 1000); dev.lastTxt = `${msg.room_name || name}·${msg.duration || 0}秒语音`; dev.online = true;
    const hist = xzHistCache.get(String(roomId)) || []; hist.push(msg); xzHistCache.set(String(roomId), hist);
    if (msg.audio_url) xzPreloadAudio(msg.audio_url);
    if (xzState.isXz && String(xzState.curId) === String(roomId)) { xzAppendMsg(msg.room_name || name, msg.audio_url, msg.duration || 0, fmtFull(dev.lastTime)); }
    else { dev.unread = (dev.unread || 0) + 1; xzCardBreath(roomId); updateXzTab(); }
    xzDevSt.set(roomId, dev); renderXzCards();
}
function xzCardBreath(roomId) { const c = document.querySelector(`.xz-card[data-id="${roomId}"]`); if (c) { c.classList.add('xz-breathing'); setTimeout(() => c.classList.remove('xz-breathing'), 6000); } }

// 设备管理 UI
window.xzAddDevice = function() {
    const id = document.getElementById('xz-new-id').value.trim(), name = document.getElementById('xz-new-name').value.trim();
    if (!id || !name) { alert('请填写房间ID和设备名称'); return; }
    const devs = xzGetCfg(); if (devs.find(d => d.id === id)) { alert('该设备已添加'); return; }
    devs.push({ id, name }); xzSaveCfg(devs);
    document.getElementById('xz-new-id').value = ''; document.getElementById('xz-new-name').value = '';
    renderXzDevList(); renderXzCards(); updateXzTab(); xzConnect(id);
};
window.xzDelDevice = function(id) { xzSaveCfg(xzGetCfg().filter(d => d.id !== id)); xzDisconnect(id); xzDevSt.delete(id); renderXzDevList(); renderXzCards(); updateXzTab(); };
function renderXzDevList() {
    const devs = xzGetCfg(), el = document.getElementById('xz-device-list');
    if (!el) return;
    if (!devs.length) { el.innerHTML = '<div class="xz-empty">暂无设备，请添加</div>'; return; }
    el.innerHTML = devs.map(d => `<div class="xz-dev-item"><div class="xz-dev-left"><div class="xz-dev-dot ${xzWsMap.has(d.id)?'on':''}"></div><div><div class="xz-dev-name">${esc(d.name)}</div><div class="xz-dev-id">ID: ${d.id}</div></div></div><button class="xz-del" onclick="xzDelDevice('${d.id}')">×</button></div>`).join('');
}
function updateXzTab() {
    const cnt = xzGetCfg().length; let total = 0; xzDevSt.forEach(d => total += (d.unread || 0));
    const el = document.getElementById('tab-xz'); if (!el) return;
    el.innerHTML = `小智设备(${cnt})${total > 0 ? `<span class="xz-tab-badge">${total}</span>` : ''}`;
}

// 小智卡片
function renderXzCards() {
    const devs = xzGetCfg(), box = document.getElementById('xz-container'); if (!box) return;
    box.innerHTML = '';
    if (!devs.length) { box.innerHTML = '<div style="text-align:center;color:var(--text-sub);padding:50px;grid-column:1/-1;font-size:14px;">暂无小智设备<br><br>点击右下角 <strong style="color:var(--xz)">🎙</strong> 按钮添加</div>'; return; }
    devs.forEach(d => {
        const dev = xzDevSt.get(d.id) || {};
        const online = dev.online && (Date.now() / 1000 - (dev.lastTime || 0)) < 300;
        const unread = dev.unread || 0;
        box.insertAdjacentHTML('beforeend', `<div class="xz-card ${online?'xz-online':''}" data-id="${d.id}" data-name="${esc(d.name)}"><div class="card-header"><span class="card-name">${esc(d.name)}</span><span class="${online?'tag-xz-online':'tag-xz'}">${online?'在线':'离线'}</span></div><div class="card-body"><div class="xz-card-icon">${online?'🎙':'💤'}</div><div class="xz-last-msg">${esc(dev.lastTxt||'等待设备接入…')}</div><div class="xz-status-row"><div class="xz-dot ${online?'on':''}"></div><span>${dev.lastTime?timeAgo(dev.lastTime):'暂无消息'}</span></div></div><div class="card-footer"><span style="color:var(--xz);font-size:12px;">小智AI设备</span>${unread?`<span class="count-badge" style="background:var(--xz)">${unread}</span>`:''}</div></div>`);
    });
    box.querySelectorAll('.xz-card').forEach(c => c.addEventListener('click', () => openXzChat(c.dataset.id, c.dataset.name)));
}

// 小智聊天框
async function openXzChat(roomId, roomName) {
    xzState.isXz = true; xzState.curId = roomId; xzState.curName = roomName;
    const dev = xzDevSt.get(roomId); if (dev) { dev.unread = 0; xzDevSt.set(roomId, dev); }
    renderXzCards(); updateXzTab();
    const dialog = document.getElementById('chat-dialog'), overlay = document.getElementById('chat-overlay');
    const msgs = document.getElementById('chat-messages');
    dialog.classList.add('xz-dialog');
    const icon = document.getElementById('chat-icon'); if(icon){icon.className='chat-hicon xz-ic';icon.textContent='智';}
    document.getElementById('chat-title').textContent = roomName;
    const sub = document.getElementById('chat-sub'); if(sub) sub.textContent = '小智AI设备 · 历史存储于公网服务器';
    document.getElementById('chat-footer-room').style.display = 'none';
    document.getElementById('chat-footer-xz').style.display = 'flex';
    msgs.innerHTML = '<div style="text-align:center;color:var(--text-sub);padding:20px;font-size:13px;">正在加载历史…</div>';
    dialog.style.display = 'flex'; overlay.style.display = 'block';
    const cached = xzHistCache.get(String(roomId));
    if (cached && cached.length) { renderXzMsgs(roomId, cached, false); }
    else {
        try {
            const r = await fetch(`${XZ_SERVER}/api/voice/history?room_id=${roomId}&page=1`);
            const rs = await r.json();
            const list = (rs.data && rs.data.list ? rs.data.list : []).reverse();
            xzHistCache.set(String(roomId), list); renderXzMsgs(roomId, list, false);
        } catch { msgs.innerHTML = '<div style="text-align:center;color:var(--text-sub);padding:20px;">加载失败，请检查服务器连接</div>'; }
    }
}
function renderXzMsgs(roomId, msgs, prepend) {
    const box = document.getElementById('chat-messages');
    if (!prepend) box.innerHTML = msgs.length ? '' : '<div style="text-align:center;color:var(--text-sub);padding:30px;font-size:13px;">暂无消息，等待小智设备发送语音</div>';
    if (prepend && msgs.length) box.insertAdjacentHTML('afterbegin', '<div class="divider"><span>── 历史记录 ──</span></div>');
    const pos = prepend ? 'afterbegin' : 'beforeend';
    msgs.forEach(m => {
        if (m.direction === 'reply') xzAppendReplyAt(m.audio_url, m.duration || 0, fmtFull(m.created_at), pos);
        else xzAppendMsgAt(m.room_name || '小智', m.audio_url, m.duration || 0, fmtFull(m.created_at), pos);
    });
    box.scrollTop = box.scrollHeight;
}
function xzAppendMsg(name, url, dur, timeStr) { xzAppendMsgAt(name, url, dur, timeStr, 'beforeend'); document.getElementById('chat-messages').scrollTop = 9999; }
function xzAppendReply(url, dur, timeStr) { xzAppendReplyAt(url, dur, timeStr, 'beforeend'); document.getElementById('chat-messages').scrollTop = 9999; }
function xzAppendReplyAt(url, dur, timeStr, pos) {
    const id = 'xr_' + Date.now() + Math.random().toString(36).slice(2, 5);
    const w = Math.min(60 + dur * 10, 280);
    document.getElementById('chat-messages').insertAdjacentHTML(pos, `<div class="msg-item self fade-up" id="${id}"><div class="msg-avatar" style="background:var(--xz)">总</div><div class="msg-content"><div class="msg-meta"><span>${timeStr}</span><span class="msg-name">总台</span></div><div class="msg-bubble" style="width:${w}px;background:#2d1060;"><span class="voice-dur">${dur}秒</span><button class="play-btn" data-src="${esc(url)}" style="background:var(--xz);">▶</button></div></div></div>`);
    const el = document.getElementById(id); if (el) el.querySelector('.play-btn').addEventListener('click', function() { xzPlayAudio(this.dataset.src, this); });
    xzPreloadAudio(url);
}
function xzAppendMsgAt(name, url, dur, timeStr, pos) {
    const id = 'xm_' + Date.now() + Math.random().toString(36).slice(2, 5);
    const w = Math.min(60 + dur * 10, 280);
    document.getElementById('chat-messages').insertAdjacentHTML(pos, `<div class="msg-item xz-msg fade-up" id="${id}"><div class="msg-avatar">智</div><div class="msg-content"><div class="msg-meta"><span class="msg-name">${esc(name)}</span><span>${timeStr}</span></div><div class="msg-bubble" style="width:${w}px;"><button class="play-btn" data-src="${esc(url)}">▶</button><span class="voice-dur">${dur}秒</span></div></div></div>`);
    const el = document.getElementById(id); if (el) el.querySelector('.play-btn').addEventListener('click', function() { xzPlayAudio(this.dataset.src, this); });
    xzPreloadAudio(url);
}

// 小智回复录音
let xzRec = null, xzIsRec = false, xzStream = null, xzRecStart = 0;
async function xzStartRec() {
    if (xzIsRec || !xzState.isXz) return;
    try {
        xzStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 44100 } });
        xzRec = RecordRTC(xzStream, { type: 'audio', mimeType: 'audio/webm', recorderType: RecordRTC.StereoAudioRecorder, numberOfAudioChannels: 1 });
        xzRec.startRecording(); xzRecStart = Date.now(); xzIsRec = true;
        const btn = document.getElementById('xz-talk-btn'), lbl = document.getElementById('xz-talk-label');
        if (btn) btn.classList.add('recording'); if (lbl) lbl.textContent = '松开发送';
    } catch { alert('无法访问麦克风'); }
}
function xzStopRec() {
    if (!xzIsRec || !xzRec) return;
    xzRec.stopRecording(async () => {
        const dur = Math.floor((Date.now() - xzRecStart) / 1000) || 1;
        await xzUploadReply(xzRec.getBlob(), dur);
        if (xzStream) xzStream.getTracks().forEach(t => t.stop()); xzRec = null;
    });
    xzIsRec = false;
    const btn = document.getElementById('xz-talk-btn'), lbl = document.getElementById('xz-talk-label');
    if (btn) btn.classList.remove('recording'); if (lbl) lbl.textContent = '按住回复';
}
async function xzUploadReply(blob, dur) {
    const ab = await blob.arrayBuffer(), ctx = new AudioContext(), buf = await ctx.decodeAudioData(ab);
    const enc = new lamejs.Mp3Encoder(1, 44100, 64), s16 = new Int16Array(buf.getChannelData(0).map(v => v * 0x7FFF)), mp3 = [];
    for (let i = 0; i < s16.length; i += 1152) { const c = s16.subarray(i, i + 1152), b = enc.encodeBuffer(c); if (b.length) mp3.push(b); }
    const f = enc.flush(); if (f.length) mp3.push(f);
    const mp3Blob = new Blob(mp3, { type: 'audio/mp3' }), reader = new FileReader();
    const b64 = await new Promise(res => { reader.onload = () => { let d = reader.result, s = d.includes(',') ? d.split(',')[1] : d; res(s.trim()); }; reader.readAsDataURL(mp3Blob); });
    try {
        const r = await fetch(`${XZ_SERVER}/api/reply/upload`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: 'xiaozhi2025', room_id: xzState.curId, room_name: xzState.curName, audio_data: b64, duration: dur }) });
        const rs = await r.json();
        if (rs.code === 200) {
            const now = Math.floor(Date.now() / 1000);
            xzAppendReply(rs.data.audio_url, dur, fmtFull(now));
            const hist = xzHistCache.get(String(xzState.curId)) || [];
            hist.push({ direction: 'reply', audio_url: rs.data.audio_url, duration: dur, created_at: now, room_name: xzState.curName });
            xzHistCache.set(String(xzState.curId), hist);
        } else { alert('发送失败: ' + rs.msg); }
    } catch (e) { alert('发送异常: ' + e.message); }
}
</script>
